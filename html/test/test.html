<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="input">
        <input type="text" id="ten" placeholder="Nhap ten">
        <input type="number" id="tuoi" placeholder="Nhap tuoi">
        <button onclick="themba()">Bam</button>
        <div id="gioitinh">
            <input type="radio" id="nam" name="giotinh">
            <p>Nam</p>
            <input type="radio" id="nu"  name="giotinh">
            <p>Nu</p>
        </div>
        <div id="table">
            <table id="content-table">
                <tr>
                    <th>Ten</th>
                    <th>Tuoi</th>
                    <th>Gioi tinh</th>
                </tr>
            </table>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
