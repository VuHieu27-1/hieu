<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>TodoList</title>
</head>
<body>
    <div id="home_page">
        <div id="menu">
            <a href="../src/index.html"><p>H<img src="../asset/img/logo_page.jpg" alt="" class="logo_page" title="HOME">ME</p></a>
        </div>
        <div id="content_page">
            <h1 class="text_center">My List</h1>
            <div id="content_block">
                <div class="block_content content_all" id="block_fisrt">
                    <i class="material-icons">apps</i>
                    <p>All Tasks</p>
                    <i class="material-icons size_point" onclick="delete_block_task()">delete</i>
                </div>
                <div class="block_content">
                    <i class="material-icons" onclick="add_task()">add</i>
                </div>
            </div>
        </div>
        <div id="add_tasks">
            <h3>Add Task</h3>
            <input type="text" placeholder="Enter task name" id="input_task_name" tabindex="1">
            <button id="add_task_btn" onclick="add_block_tasks()">Add Task</button>
            <div id="select_color">
                <div class="color-block color_1" onclick="select_color_1()" tabindex="2"></div>
                <div class="color-block color_2" onclick="select_color_2()" tabindex="3"></div>
                <div class="color-block color_3" onclick="select_color_3()" tabindex="4"></div>
                <div class="color-block color_4" onclick="select_color_4()" tabindex="5"></div>
            </div>
            <p class="note">Please choose a color before creating the task.</p>
        </div>
        <div id="over_load" onclick="add_task()">
            <!-- Noi dung trong -->
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
