<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
        }
        #main_page {
            display: grid;
            grid-template-columns: 3fr 5fr;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
        }
        .intro{
            grid-column: 1/3;
            border-radius: 16px;
            background-color: rgb(121, 117, 112);
        }
        .intro img{
            display: block;
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .intro_text{
            padding: 20px 24px 24px;
            color: white;
        }
        .intro_text h1{
            margin-bottom: 10px;
        }
        .side-bar{
            grid-column: 1/2;
            gap: 20px;
            display: grid;
        }
        .side-bar .certificate
        {
            min-height: 180px;
            padding: 20px;
            border-radius: 16px;
            background-color: lightblue;
        }
        .side-bar .overview
        {
            min-height: 180px;
            padding: 20px;
            border-radius: 16px;
            background-color: lightcoral;
        }
        .content{
            grid-column: 2/3;
            display: grid;
            gap: 20px;
            grid-template-columns: 5fr 5fr; 
        }
        .schedule{
            grid-column: 1/3;
            min-height: 180px;
            border-radius: 16px;
            background-color: lightgreen;
        }
        .rank{
            grid-column: 1/2;
            min-height: 180px;
            border-radius: 16px;
            background-color: lightpink;
        }
        .contact{
            grid-column: 2/3;
            min-height: 180px;
            border-radius: 16px;
            background-color: rgb(16, 82, 82);
        }
    </style>
</head>
<body>
    <div id="main_page">
        <div class="intro">
            <img src="./img/advertising_d.webp" alt="">
            <div class="intro_text">
                <h1>Welcome to Our Booking System</h1>
                <p>Book your ride with us today!</p>
            </div>
        </div>
        <div class="side-bar">
            <div class="certificate">
                <h2>Our Certificate</h2>
                <p>We are certified by the best in the industry.</p>
            </div>
            <div class="overview">
                <h2>Overview</h2>
                <p>Here's what you need to know about our services.</p>
            </div>
        </div>
        <div class="content">
            <div class="schedule"></div>
            <div class="rank"></div>
            <div class="contact"></div>
        </div>
    </div>
</body>
</html>
