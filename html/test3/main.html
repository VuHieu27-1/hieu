<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #main_page {
            display: grid;
            grid-template-columns: 3fr 5fr;
            height: 100vh;
        }
        .intro{
            grid-column: 1/3;
            width: 100%;
            height: auto;
            margin-bottom: 10px;
            background-color: antiquewhite;
        }
        .intro .description{
            padding: 20px;
        }
        .intro img{
            width: 100%;
            height: min(30vh, 300px);
        }
        .side-bar{
            grid-column: 1/2;
            margin-left: 10px;
            margin-right: 10px;
            width: 100%;
            height: auto;
        }
        .side-bar .certificate
        {
            width: 100%;
            height: min(30vh, 300px);
            background-color: lightblue;
        }
        .certificate h2, .overview h2{
            margin: 0;
        }
        .side-bar .overview
        {
            width: 100%;
            height: min(30vh, 300px);
            background-color: lightcoral;
        }
        .content{
            grid-column: 2/3;
            display: grid;
            grid-template-columns: 5fr 5fr;
            width: 100%;
            height: auto;
        }
        .schedule{
            margin-left: 10px;
            grid-column: 1/3;
            width: 100%;
            height: min(30vh, 300px);
            background-color: lightgreen;
        }
        .rank{
            grid-column: 1/2;
            width: 100%;
            height: min(30vh, 300px);
            background-color: lightpink;
        }
        .contact{
            grid-column: 2/3;
            width: 100%;
            height: min(30vh, 300px);
            background-color: rgb(16, 82, 82);
        }
    </style>
</head>
<body>
    <div id="main_page">
        <div class="intro">
            <img src="./img/advertising_d.webp" alt="">
            <div class="description">
                <h1>Welcome to Our Booking System</h1>
                <p>Book your ride with us today!</p>
            </div>
        </div>
        <div class="side-bar">
            <div class="certificate">
                <h2>Our Certificate</h2>
                <p>We are certified by the best in the industry.</p>
            </div>
            <div class="overview">
                <h2>Overview</h2>
                <p>Here's what you need to know about our services.</p>
            </div>
        </div>
        <div class="content">
            <div class="schedule"></div>
            <div class="rank"></div>
            <div class="contact"></div>
        </div>
    </div>
</body>
</html>
