services:
  buggy-booking-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buggy-booking-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
