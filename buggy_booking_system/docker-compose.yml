services:
  mock-dispatch-server:
    profiles: ["mock"]
    build:
      context: ../mock_dispatch_server
      dockerfile: Dockerfile
    container_name: mock-dispatch-server
    restart: unless-stopped
    environment:
      PORT: 4001

  buggy-booking-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buggy-booking-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DISPATCH_API_URL: ${DISPATCH_API_URL:-http://mock-dispatch-server:4001}
    volumes:
      - ./data:/app/data
